syntax = "proto3";

package getamis.alice.crypto.blsmpc;

option go_package = "github.com/getamis/alice/crypto/tss/bls";

import "github.com/getamis/alice/crypto/birkhoffinterpolation/bk.proto";

message SignMessage {
  bytes signature = 1;
  bytes publicKey = 2;
  birkhoffinterpolation.BkParameterMessage bk = 3;
}

message ShareValidationMessage {
  bytes partialPubKey = 1;
  bytes publicKey = 2;
  birkhoffinterpolation.BkParameterMessage bk = 3;
  SchnorrProofG1Message proof = 4;
}

message SchnorrProofG1Message {
  bytes salt = 1;
  bytes V = 2;
  bytes r = 3;
  bytes auxMsg = 4;
}
